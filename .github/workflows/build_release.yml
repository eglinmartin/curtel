name: Build for Windows and macOS
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package .love file
        shell: bash
        run: |
          7z a -tzip game.love ./*.lua ./assets/ ./bin/ ./src/ ./lib/

      - name: Build Windows packages
        uses: love-actions/love-actions-windows@v1
        with:
          love-ref: "11.5"
          love-package: ./game.love
          product-name: "Curtel"
          output-folder: ./build/windows
          love-actions-folder: ./love-actions-windows
          icon-path: ./assets/icon_128x128.png

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ./build/windows/Curtel_x64.zip

  build-macos:
      runs-on: macos-latest
      permissions:
        contents: write
      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
            
        - name: Create icon
          run: |
            mkdir -p ./MyIcon.iconset
            cp ./assets/icon_128x128.png ./MyIcon.iconset/icon_128x128.png
            iconutil -c icns ./MyIcon.iconset -o ./icon.icns
            
        - name: Package .love file
          run: |
            zip -r game.love ./*.lua ./assets/ ./bin/ ./src/ ./lib/
  
        - name: Build macOS package
          run: |
            curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-macos.zip -o love.zip
            unzip love.zip
            cp game.love love.app/Contents/Resources/
            cp ./icon.icns love.app/Contents/Resources/GameIcon.icns
            mv love.app Curtel.app
            mkdir -p ./build/macos
            zip -r ./build/macos/Curtel.app.zip Curtel.app
  
        - name: Upload macOS artifact
          uses: actions/upload-artifact@v4
          with:
            name: macos-build
            path: ./build/macos/Curtel.app.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Delete old release and tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.rest.repos.listReleases({ owner, repo });
            const latest = releases.data.find(r => r.tag_name === 'latest');
            if (latest) await github.rest.repos.deleteRelease({ owner, repo, release_id: latest.id });
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/latest' });
            } catch {}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          draft: false
          prerelease: false
          files: |
            ./artifacts/windows-build/Curtel_x64.zip
            ./artifacts/macos-build/Curtel.app.zip
