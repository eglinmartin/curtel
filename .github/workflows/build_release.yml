name: Build for Windows
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package .love file
        shell: bash
        run: |
          7z a -tzip game.love ./*.lua ./assets/ ./bin/ ./src/ ./lib/

      - name: Build Windows packages
        uses: love-actions/love-actions-windows@v1
        with:
          love-ref: "11.5"
          love-package: ./game.love
          product-name: "Curtel"
          output-folder: ./build/windows
          love-actions-folder: ./love-actions-windows

      - name: Build macOS package
        uses: love-actions/love-actions-macos-portable@v1
        with:
          love-ref: "11.5"
          love-package: ./game.love
          product-name: "Curtel"
          output-folder: ./build/macos

      - name: Delete old release and tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const releases = await github.rest.repos.listReleases({ owner, repo });
            const latest = releases.data.find(r => r.tag_name === 'latest');
            if (latest) await github.rest.repos.deleteRelease({ owner, repo, release_id: latest.id });
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/latest' });
            } catch {}
      
      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          draft: false
          prerelease: false
          files: |
            ./build/windows/Curtel_x64.zip
            ./build/macos/Curtel.app.zip
